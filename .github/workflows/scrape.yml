name: Laru Wind Scraper & Oracle

on:
  schedule:
    - cron: '*/20 * * * *'  # Ajaa 20 minuutin välein
  workflow_dispatch:        # Sallii manuaalisen testiajon nappia painamalla

jobs:
  scrape_and_predict:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # TÄRKEÄ: Sallii tiedostojen tallennuksen takaisin repoon
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests gspread google-auth numpy fmiopendata

      - name: Run Telegram Bot & Sheets Update
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python oracle.py

      - name: Run Oracle Forecast (Web-sivu & Petri-log)
        run: python ennusta_laru.py

      - name: Run History Logger (Toteuma-logi)
        run: python log_toteuma.py

      - name: Save Data to Repo
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Haetaan mahdolliset muutokset alta, jotta push ei hylkää
          git pull origin main --rebase || echo "Ei noudettavaa"
          
          git add ennuste.json || true
          git add history.csv || true
          git add ennuste_vertailu.csv || true
          
          if git diff --staged --quiet; then
            echo "Ei uutta commitattavaa"
          else
            git commit -m "Update oracle data and logs [skip ci]"
            # Käytetään force-pushia vain jos rebase epäonnistuu, 
            # tai pusketaan normaalisti jos kaikki ok.
            git push origin main
          fi
