name: Laru Wind Scraper & Oracle

on:
  schedule:
    - cron: '*/20 * * * *'  # Ajaa 20 minuutin välein
  workflow_dispatch:        # Manuaalinen käynnistys

jobs:
  scrape_and_predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests gspread google-auth fmiopendata numpy

      - name: Run Telegram Bot & Sheets Update
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python oracle.py

      - name: Run Oracle Forecast (Web-sivu)
        run: python ennusta_laru.py

      - name: Run History Logger (CSV)
        run: python log_toteuma.py

      - name: Save History and Forecast
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # Lisätään tiedostot yksi kerrallaan, jotta puuttuva history.csv ei kaada ajoa
          git add ennuste.json || true
          git add history.csv || true
          
          # Commit vain jos jotain muutosta tapahtui
          git commit -m "Update wind data and history [skip ci]" || echo "Ei uutta commitattavaa"
          git push || echo "Ei uutta pushattavaa"
