name: Paivita Laru Ennuste

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run prediction
        run: python ennusta_laru.py

      - name: Commit and Push
        run: |
          git config --global user.name "Laru Oracle"
          git config --global user.email "oracle@laru.fi"
          
          # TÄMÄ KORJAA REJECTED-VIRHEEN:
          git pull origin main --rebase 

          git add ennuste.json
          
          if git diff --staged --quiet; then
            echo "Ei muutoksia datassa."
          else
            git commit -m "Update prediction data $(date)"
            git push origin main
          fi
