name: Paivita Laru Ennuste

on:
  schedule:
    - cron: '0 */3 * * *' # Ajaa 3 tunnin välein
  workflow_dispatch: # Mahdollistaa manuaalisen ajon

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Hakee koko historian, jotta push onnistuu paremmin

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas requests

      - name: Run prediction
        run: python ennusta_laru.py

      - name: Commit and Push
        run: |
          git config --global user.name "Laru Oracle"
          git config --global user.email "oracle@laru.fi"
          
          # Pakotetaan paikallinen tila vastaamaan pilveä ilman kikkailua
          git add ennuste.json
          
          # Tarkistetaan onko tiedosto oikeasti muuttunut
          if git diff --staged --quiet; then
            echo "Ei muutoksia datassa."
          else
            git commit -m "Update prediction data $(date)"
            # Käytetään rebasea, jotta mahdolliset selainmuutokset yhdistetään kiltisti
            git pull --rebase origin main
            git push origin main
          fi
