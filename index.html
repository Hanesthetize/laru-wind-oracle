<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laru Wind Oracle рЯМђпЄП</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; max-width: 900px; margin: 0 auto; padding: 10px; background: #eaeff2; }
        .container { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        h1 { color: #1a2a3a; text-align: center; margin-bottom: 5px; font-size: 1.5em; }
        .status-legend { display: flex; justify-content: center; gap: 8px; margin: 10px 0; font-size: 0.7em; flex-wrap: wrap; }
        .tag { padding: 3px 6px; border-radius: 4px; color: white; font-weight: bold; text-transform: uppercase; }
        .bad { background: #bdc3c7; } .doable { background: #f1c40f; color: black; } 
        .good { background: #2ecc71; } .hard { background: #e67e22; }
        .chart-wrapper { position: relative; height: 300px; width: 100%; }
        #arrow-row { display: flex; margin-left: 32px; margin-right: 10px; border-top: 1px solid #eee; padding-top: 5px; }
        .arrow-item { flex: 1; text-align: center; font-size: 1em; cursor: help; }
        .date-label { font-size: 0.7em; color: #888; text-align: center; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>рЯМђпЄП Laru Wind Oracle</h1>
        <div style="text-align: center; color: #666; font-size: 0.8em; margin-bottom: 10px;">Ennuste: Hanesthetize Local Surf Model</div>

        <div class="status-legend">
            <span class="tag bad">< 5</span>
            <span class="tag doable">5-7</span>
            <span class="tag good">7-10</span>
            <span class="tag hard">10+ m/s</span>
        </div>

        <div class="chart-wrapper">
            <canvas id="windChart"></canvas>
        </div>
        
        <div id="arrow-row"></div>
        <div id="date-row" style="display: flex; margin-left: 32px; margin-right: 10px;"></div>

        <div style="margin-top: 20px; font-size: 0.75em; color: #777; border-top: 1px dashed #ccc; padding-top: 10px;">
            <strong>рЯФґ Oranssi timantti:</strong> Optimi suunta (170¬∞-250¬∞). <br>
            <strong>Nuoli:</strong> Osoittaa minne tuuli puhaltaa (вђЖпЄП = etel√§tuuli).
        </div>
    </div>

    <script>
        function getArrowEmoji(deg) {
            // FMI suunta on MIST√Д tuulee. Emoji asetetaan osoittamaan MINNE tuuli menee.
            const arrows = ['вђЗпЄП', 'вЖЩпЄП', 'вђЕпЄП', 'вЖЦпЄП', 'вђЖпЄП', 'вЖЧпЄП', 'вЮ°пЄП', 'вЖШпЄП'];
            const idx = Math.round(deg / 45) % 8;
            return arrows[idx];
        }

        async function drawChart() {
            try {
                const response = await fetch('ennuste.json');
                const data = await response.json();
                const displayData = data.slice(0, 30); // N√§ytet√§√§n n. 30 tuntia

                const labels = displayData.map(d => d.aika_str.split('klo')[1].trim());
                const dates = displayData.map(d => d.aika_str.split('klo')[0].trim());
                const laruData = displayData.map(d => d.laru_ms);
                const harData = displayData.map(d => d.har_ms);
                const directions = displayData.map(d => d.har_dir);

                // Rakennetaan nuoli- ja p√§iv√§m√§√§r√§rivit
                const arrowRow = document.getElementById('arrow-row');
                const dateRow = document.getElementById('date-row');
                
                let lastDate = "";
                displayData.forEach((d, i) => {
                    // Nuoli
                    const aSpan = document.createElement('span');
                    aSpan.className = "arrow-item";
                    aSpan.title = `${dates[i]} klo ${labels[i]}: ${directions[i]}¬∞`;
                    aSpan.innerHTML = getArrowEmoji(directions[i]);
                    arrowRow.appendChild(aSpan);

                    // P√§iv√§m√§√§r√§ (vain kun se muuttuu tai eka)
                    const dSpan = document.createElement('span');
                    dSpan.className = "date-label";
                    dSpan.style.flex = "1";
                    if (dates[i] !== lastDate) {
                        dSpan.innerHTML = dates[i].split('.')[0] + "." + dates[i].split('.')[1];
                        lastDate = dates[i];
                    }
                    dateRow.appendChild(dSpan);
                });

                const ctx = document.getElementById('windChart').getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [
                            {
                                label: 'Laru (m/s)',
                                data: laruData,
                                borderColor: '#2980b9',
                                backgroundColor: 'rgba(52, 152, 219, 0.1)',
                                fill: true,
                                tension: 0.4,
                                borderWidth: 3,
                                pointRadius: 4,
                                pointBackgroundColor: directions.map(d => (d >= 170 && d <= 250) ? '#e67e22' : '#2980b9'),
                                pointStyle: directions.map(d => (d >= 170 && d <= 250) ? 'rectRot' : 'circle'),
                            },
                            {
                                label: 'Harmaja',
                                data: harData,
                                borderColor: '#ccc',
                                borderDash: [5, 5],
                                fill: false,
                                pointRadius: 0,
                                tension: 0.4
                            }
                        ]
                    },
                    options: {
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            x: { grid: { display: false }, ticks: { font: { size: 9 } } },
                            y: { beginAtZero: true, ticks: { font: { size: 10 } } }
                        }
                    }
                });
            } catch (e) { console.error(e); }
        }
        drawChart();
    </script>
</body>
</html>
