<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laru Wind Oracle 🌬️</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; max-width: 900px; margin: 0 auto; padding: 15px; background: #eaeff2; }
        .container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        h1 { color: #1a2a3a; text-align: center; margin-bottom: 5px; }
        .status-legend { display: flex; justify-content: center; gap: 10px; margin: 15px 0; font-size: 0.75em; flex-wrap: wrap; }
        .tag { padding: 4px 8px; border-radius: 4px; color: white; font-weight: bold; }
        .bad { background: #bdc3c7; } .doable { background: #f1c40f; color: black; } 
        .good { background: #2ecc71; } .hard { background: #e67e22; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌬️ Laru Wind Oracle</h1>
        <div style="text-align: center; color: #666; font-size: 0.85em; margin-bottom: 10px;">
            Hanesthetize's Local Surf Forecast
        </div>

        <div class="status-legend">
            <span class="tag bad">< 5 m/s</span>
            <span class="tag doable">5-7 m/s</span>
            <span class="tag good">7-10 m/s</span>
            <span class="tag hard">10+ m/s</span>
        </div>

        <canvas id="windChart"></canvas>
        
        <div style="margin-top: 15px; font-size: 0.8em; color: #777; line-height: 1.4;">
            <strong>Vinkki:</strong> Timantin muotoinen piste 🔶 = Optimi suunta (170°-250°).<br>
            Harmaa katkoviiva = Harmaja (avomeri). Sininen alue = Larun ranta.
        </div>
    </div>

    <script>
        async function drawChart() {
            try {
                const response = await fetch('ennuste.json');
                const data = await response.json();

                const labels = data.map(d => d.aika_str);
                const laruData = data.map(d => d.laru_ms);
                const harData = data.map(d => d.har_ms);
                const directions = data.map(d => d.har_dir);

                const ctx = document.getElementById('windChart').getContext('2d');
                
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [
                            {
                                label: 'Laru (m/s)',
                                data: laruData,
                                borderColor: '#2980b9',
                                backgroundColor: 'rgba(52, 152, 219, 0.2)',
                                fill: true,
                                tension: 0.4,
                                borderWidth: 3,
                                pointRadius: 5,
                                pointHitRadius: 10,
                                pointStyle: directions.map(d => (d >= 170 && d <= 250) ? 'rectRot' : 'circle'),
                                pointBackgroundColor: directions.map(d => (d >= 170 && d <= 250) ? '#e67e22' : '#2980b9')
                            },
                            {
                                label: 'Harmaja (m/s)',
                                data: harData,
                                borderColor: '#ccc',
                                borderDash: [5, 5],
                                fill: false,
                                pointRadius: 0,
                                tension: 0.4
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            tooltip: {
                                callbacks: {
                                    afterLabel: function(context) {
                                        const i = context.dataIndex;
                                        return `Suunta: ${directions[i]}°`;
                                    }
                                }
                            }
                        },
                        scales: {
                            y: { beginAtZero: true, title: { display: true, text: 'm/s' } }
                        }
                    }
                });
            } catch (e) {
                console.error("Datan lataus epäonnistui:", e);
                document.body.innerHTML += "<p style='text-align:center; color:red;'>Hups! Ennustetta ei saatu ladattua. Tarkista että ennuste.json on olemassa.</p>";
            }
        }
        drawChart();
    </script>
</body>
</html>
