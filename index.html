<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laru Wind Oracle 🌬️</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; max-width: 900px; margin: 0 auto; padding: 15px; background: #eaeff2; }
        .container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        h1 { color: #1a2a3a; text-align: center; margin-bottom: 5px; }
        .status-legend { display: flex; justify-content: center; gap: 10px; margin: 15px 0; font-size: 0.75em; flex-wrap: wrap; }
        .tag { padding: 4px 8px; border-radius: 4px; color: white; font-weight: bold; }
        .bad { background: #bdc3c7; } .doable { background: #f1c40f; color: black; } 
        .good { background: #2ecc71; } .hard { background: #e67e22; }
        #arrow-container { display: flex; justify-content: space-between; padding: 0 45px; margin-top: -10px; font-size: 1.2em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌬️ Laru Wind Oracle</h1>
        <div style="text-align: center; color: #666; font-size: 0.85em; margin-bottom: 10px;">
            Hanesthetize's Local Surf Forecast
        </div>

        <div class="status-legend">
            <span class="tag bad">< 5 m/s</span>
            <span class="tag doable">5-7 m/s</span>
            <span class="tag good">7-10 m/s</span>
            <span class="tag hard">10+ m/s</span>
        </div>

        <div style="position: relative; height: 350px;">
            <canvas id="windChart"></canvas>
        </div>
        
        <div id="arrow-row" style="display: flex; overflow: hidden; margin-left: 35px; margin-right: 5px; padding-top: 5px; border-top: 1px solid #eee;"></div>

        <div style="margin-top: 25px; font-size: 0.8em; color: #777; line-height: 1.4; border-top: 1px dashed #ccc; padding-top: 10px;">
            <strong>Symbolit:</strong> 🔶 = Optimi surffisuunta (170°-250°). <br>
            <strong>Nuolet:</strong> Osoittavat tuulen suunnan (esim. ⬆️ = etelätuuli, tuulee ylöspäin).
        </div>
    </div>

    <script>
        function getArrowEmoji(deg) {
            // FMI suunta on mistä tuulee. Emoji osoittaa minne tuulee.
            // Lisätään 180 astetta jotta nuoli osoittaa tuulen liikkeen suuntaan.
            const arrows = ['⬇️', '↙️', '⬅️', '↖️', '⬆️', '↗️', '➡️', '↘️'];
            const idx = Math.round(deg / 45) % 8;
            return arrows[idx];
        }

        async function drawChart() {
            try {
                const response = await fetch('ennuste.json');
                const data = await response.json();

                // Otetaan vain joka toinen piste jos dataa on liikaa nuolille
                const chartData = data.slice(0, 24); 

                const labels = chartData.map(d => d.aika_str.split('klo')[1]); // Vain kellonaika akselille
                const laruData = chartData.map(d => d.laru_ms);
                const harData = chartData.map(d => d.har_ms);
                const directions = chartData.map(d => d.har_dir);

                // Luodaan nuolirivi
                const arrowRow = document.getElementById('arrow-row');
                chartData.forEach(d => {
                    const span = document.createElement('span');
                    span.style.flex = "1";
                    span.style.textAlign = "center";
                    span.style.fontSize = "0.9em";
                    span.title = d.har_dir + "°";
                    span.innerHTML = getArrowEmoji(d.har_dir);
                    arrowRow.appendChild(span);
                });

                const ctx = document.getElementById('windChart').getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [
                            {
                                label: 'Laru (m/s)',
                                data: laruData,
                                borderColor: '#2980b9',
                                backgroundColor: 'rgba(52, 152, 219, 0.15)',
                                fill: true,
                                tension: 0.4,
                                borderWidth: 3,
                                pointRadius: 5,
                                pointBackgroundColor: directions.map(d => (d >= 170 && d <= 250) ? '#e67e22' : '#2980b9'),
                                pointStyle: directions.map(d => (d >= 170 && d <= 250) ? 'rectRot' : 'circle'),
                            },
                            {
                                label: 'Harmaja',
                                data: harData,
                                borderColor: '#ccc',
                                borderDash: [5, 5],
                                fill: false,
                                pointRadius: 0,
                                tension: 0.4
                            }
                        ]
                    },
                    options: {
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false }
                        },
                        scales: {
                            y: { beginAtZero: true, max: Math.max(...harData) + 2 }
                        }
                    }
                });
            } catch (e) {
                console.error(e);
            }
        }
        drawChart();
    </script>
</body>
</html>
